<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Tendon App">
<meta name="theme-color" content="#0b0d10">
<title>The Tendon App</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
// offline install: after first load the app runs entirely on this device.
// When an update finishes installing, reload once so new features show up on
// THIS open instead of the next one. Never reload while a timer is running,
// and not on the very first install (no old controller to replace).
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  var hadController = !!navigator.serviceWorker.controller;
  var reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    if (!hadController || reloaded) return;
    if (localStorage.getItem('rl.timer')) return;
    reloaded = true;
    location.reload();
  });
  navigator.serviceWorker.register('sw.js').catch(function () {});
}
</script>
</body>
</html>
